<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
  let height = 5;
  let width = 15;

  for (let i = 1; i <= height; i++) {
    for (let j = 1; j <= width; j++) {
      if (i === 1 || i === height || j === 1 || j === width) {
        document.write("*");
      } else {
        document.write("&nbsp;&nbsp");
      }
    }
    document.write("<br>");
  }

  //&nbsp: 1 nửa khoảng trắng
</script>
</body>
</html>
