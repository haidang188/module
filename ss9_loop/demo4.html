<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    let num = +prompt("Enter a number: "); //total = 5
    let total = 0;

    for (let i = 0; i <= num; i += 1) {
        total += i; // total = total + i
        // i = 0 -> true -> total = 1
        // i = 1 -> true => total = 2
        // i = 2 -> true -> total = 4
        // i = 3 -> true -> total = 7
        // i = 4 -> true -> total = 11
        // i = 5 -> true -> total = 15
        // i = 6 -> false -> stop

    }
    document.write(total);

</script>
</body>
</html>
