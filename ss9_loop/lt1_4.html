<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
  let a = 0;
  let b = 1;

  while (true) {
    if (a % 5 === 0 && a !== 0) {
      document.write("So dau tien chia het cho 5 la: " + a);
      break;
    }
    let c = a + b;
    a = b;
    b = c;
  }
</script>
</body>
</html>
