<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

/* Viết chương trình đếm số nguyên âm trong một mảng.*/
<script>
  let numbers = [-5, -2, -1, -8, - 12, 3, 6, 9];
  let count = 0;

  document.write("Các số nguyên âm là: ")
  for (let i = 0; i < numbers.length; i++) {
    if (numbers[i] < 0) {
      document.write(numbers[i] + " ");
      count++;
    }
  }

</script>
</body>
</html>
