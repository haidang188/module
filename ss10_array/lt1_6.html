<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>


/*Viết chương trình khởi tạo hoặc nhập vào một mảng số nguyên gồm 10 phần tử.
Nhập hoặc tạo một phần tử số nguyên V. Chương trình tìm xem V có nằm trong mảng không.
Nếu V thuộc mảng, in ra: "V is in the array".
Nếu không, in ra: "V is not in the array". */

<script>
    let numbers = [1, 2, 5, 6, 8, 9, 10, 12, 16, 18];
    let V = +prompt("Nhập vào 1 số nguyên: ");
    let found = false;

    for (let i = 0; i < numbers.length; i++) {
        if (numbers[i] === V) {
            found = true;
            break;
        }
    }
    if (found) {
        document.write(V + " is in the array");
    } else {
        document.write(V + " is not in the array");
    }
</script>
</body>
</html>
