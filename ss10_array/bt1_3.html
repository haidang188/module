<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
  let str = prompt("Enter a string: ");
  let result = "";

  for (let i = 0; i < str.length; i++) {
    let char = str[i];

    if (char >= 'a' && char <= 'z') {
      result += char.toUpperCase();
    } else if (char >= 'A' && char <= 'Z') {
      result += char.toLowerCase();
    }
    else {
      result += char;
    }
  }
  document.write(result);
</script>
</body>
</html>
