<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<!--/*Viết chương trình khởi tạo một mảng số nguyên gồm 10 phần tử khác nhau.-->
<!--Chương trình hiển thị phần tử có giá trị lớn nhất trong mảng và vị trí của phần tử đó. */-->

<script>
    let numbers = [1, 3, 5, 7, 2, 4, 6, 8, 10, 16];
    let index = 0;
    let max = numbers[0];

    for (let i = 1; i < numbers.length; i++) {
        if (numbers[i] > max) {
            max = numbers[i];
            index = i;
        }
    }
    document.write("Giá trị lớn nhất trong mảng là: " + max + "<br>");
    document.write("Vị trí của phần tử là: " + index);
</script>
</body>
</html>
