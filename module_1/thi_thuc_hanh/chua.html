<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    let point = +prompt("Nhap diem");
    if (point < 50) {
        document.write("Truot");
    } else {
        let temp = point % 5;
        if(temp >= 3) {
            point = point + (5 - temp);
            document.write(point);
        } else {
            document.write(point);
        }
    }

</script>
</body>
</html>
