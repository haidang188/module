<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
  function isPrime(number) {
    let count = 0;
    let isPrime = false;

    if (number <= 1) {
      document.write(`${number} khong phai la so nguyen to` );
      return;
    }

    for (let i = 1; i <= number; i++){
      if (number % i === 0) {
        count++;
      }
    }
    if (count === 2) {
      isPrime = true;
    }

    if (isPrime) {
      document.write(`${number} la so nguyen to`);
    } else {
      document.write(`${number} khong phai la so nguyen to`);
    }
  }

// Goi ham
  let number = +prompt("Nhap so can kiem tra: ");
  if (isNaN(number)) {
    document.write("Gia tri khong hop le. Vui long nhap so");
  } else {
    isPrime(number);
  }


</script>
</body>
</html>
