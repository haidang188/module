<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
  function reverseArray(arr) {
    return arr.reverse();
  }
  let numbers = [1,3,5,7,9,11,15];
  document.write(`Mang ban dau: [${numbers}] <br>`);

  let reversed = reverseArray(numbers);
  document.write(`Mang sau khi dao nguoc: [${reversed}]`);
</script>
</body>
</html>
