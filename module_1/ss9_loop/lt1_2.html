<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
  let c = parseInt(prompt("Hãy nhập nhiệt độ: "));
  while (c > 100 || c < 20) {
  if (c > 100) {
    alert("Nhiệt độ quá cao, hãy giảm nhiệt độ ");
  } else if (c < 20)  {
  alert("Nhiệt độ quá thấp, hãy tăng nhiệt độ ")
  }
  c = parseInt(prompt("Hãy nhập lại nhiệt độ"));
  }
</script>
</body>
</html>
