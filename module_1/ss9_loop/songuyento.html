<script>
  /* Số nguyên tố là số nguyên dương bắt đầu từ 2 và chỉ có 2 ước là 1 và chính nó  */

  let number = +prompt("Nhập số cần kiểm tra: ");
  let count = 0; // đếm ước số
  for (let i = 1; i <= number; i++) {
    if (number % i === 0) {
      count++;
    }
  }
  if (count === 2) {
    alert(number + "Là số nguyên tố");
  } else {
    alert(number + "Không phải là số nguyên tố");
  }
