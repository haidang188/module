<script>
  let count = 0;
  let num = 1;
  let sum = 0;

  while (count < 30) {
    if (num % 7 === 0) {
      document.write(num + " ");
      sum += num;
      count++;
    }
    num++;
  }
  document.write(" <br> Tong = " + sum);
