<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
  let a = 1;
  let b = 1;
  let sum = 0;

  for (let i = 1; i <= 20; i++) {
    document.write(a + " " );
    sum += a;
    let c = a + b;
    a = b;
    b = c;
  }
  document.write("Tong 20 so fibonacci dau tien la:  "  +sum);
</script>
</body>
</html>
