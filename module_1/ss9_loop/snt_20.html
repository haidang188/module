<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    let countSNT = 0;
    let n = 2;

    while (countSNT < 20) {
        let count = 0;

        for (let i = 1; i <= n; i++) {
            if (n % i === 0) {
                count++;
            }
        }

        if (count === 2) {
            document.write(n + " ");
            countSNT++;
        }
        n++;
    }
</script>
</body>
</html>
