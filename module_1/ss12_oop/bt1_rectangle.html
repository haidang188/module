<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    class Rectangle {
        constructor(length, width) {
            this.length = length;
            this.width = width;
        }
        getPerimeter() {
            return (this.length + this.width) * 2;
        }
        getArea() {
            return this.length * this.width;
        }

    }
    let rectangle1 = new Rectangle(5,7);
    document.write(`Perimeter: ${rectangle1.getPerimeter()}<br>`);
    document.write(`Area: ${rectangle1.getArea()}`);
</script>
</body>
</html>
