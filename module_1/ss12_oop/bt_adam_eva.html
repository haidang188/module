<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    class Apple {
        constructor() {
            this.weight = 10;
        }

        decrease() {
            if (this.weight > 0) {
                this.weight--;
            }
        }

        isEmpty() {
            return this.weight === 0;

        }

        getWeight() {
            return this.weight;
        }
    }

    class Human {
        constructor(name, gender, weight) {
            this.name = name;
            this.gender = gender;
            this.weight = weight;
        }

        isMale() {
            return this.gender;

        }

        setGender(gender) {
            this.gender = gender;
        }

        checkApple(apple) {
            document.write(`${this.name} kiem tra: tao con ${apple.getWeight()} don vi <br>`);

        }

        eat(apple) {
            if (!apple.isEmpty()) {
                apple.decrease();
                this.weight++;
                document.write(`${this.name} an mot mieng tao <br>`);
            } else {
                document.write(`${this.name} noi: Het tao roi <br>`);
            }
        }

        say(word) {
            document.write(`${this.name} noi: ${word} <br>`);
        }

        getName() {
            return this.name;
        }

        setName(name) {
            this.name = name;
        }

        getWeight() {
            return this.weight;
        }

        setWeight(weight) {
            this.weight = weight;
        }

    }

    let apple = new Apple();

    let adam = new Human("Adam", true, 60);
    let eva = new Human("Eva", false, 50);

    adam.say("Hi Eva! Hay an tao di" + "<br>");
    eva.say("Hello Adam. Ok thoi" + "<br>");

    while (!apple.isEmpty()) {
        adam.eat(apple);
        adam.checkApple(apple);
        if (apple.isEmpty()) break;

        eva.eat(apple);
        eva.checkApple(apple);
    }

    document.write(`Tao da het <br>`);
    document.write(`Can nang cua Adam: ${adam.getWeight()} <br>`);
    document.write(`Can nang cua Eva: ${eva.getWeight()} <br>`);



</script>
</body>
</html>
