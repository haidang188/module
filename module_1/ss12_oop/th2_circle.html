<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    class Circle {
        constructor(radius, color) {
            this.radius = radius;
            this.color = color;
        }

        getRadius() {
            return this.radius;
        }

        getArea() {
            return Math.PI * this.radius * this.radius;
        }

    }
    let circle1 = new Circle(2);
    document.write(`Radius : ${circle1.getRadius()} <br>`);
    document.write(`Area: ${circle1.getArea()}`);
</script>
</body>
</html>
