<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    let x = [-3, 5, 1, 3, 2, 10];
    let first = 0;
    let last = x.length - 1;

    while (first < last) {
        let b = x[first]; // b = 3
        x[first] = x[last]; // -> x[0] = x [5] -> x[0] = 10 -> [10, 5, 1, 3, 2]
        x[last] = b; // -> x[5] = -3 -> [10, 5, 1, 3, 2, -3]
        first++;
        last--;
    }
    document.write(x);
</script>
</body>
</html>
