<!--/* Viết chương trình khởi tạo hoặc nhập vào một mảng số nguyên và đảo ngược các phần tử trong mảng. */-->
<script>
  let x = [2, 3, 5, 6, 8, 9, 1, 12, 16];
  let first = 0;
  let last = x.length - 1;

  while (first < last) {
    let b = x[first];
    x[first] = x[last];
    x[last] = b;
    first++;
    last--;
  }
  document.write(x);
</script>
</body>
