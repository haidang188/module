<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
  let num = prompt("Enter a number: ");
  let result = num[0];

  for (let i = 1; i < num.length; i++) {
    let a = parseInt(num[i]);
    let b = parseInt(num[i - 1]);

    if (a % 2 === 0 && b % 2 === 0) {
      result += "-" + num[i];
    } else {
      result += num[i];
    }
  }
  document.write(result);
</script>
</body>
</html>
