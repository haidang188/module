<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
  let str = prompt("Nhập vào một chuỗi: ");
  let count = 0;
  let inWord = false;

  for (let i = 0; i < str.length; i++) {
    if (str[i] !== ' ' && !inWord) {
      count++;
      inWord = true;
    }
    else if (str[i] ===' ') {
      inWord = false;
    }
  }
  document.write("Số lượng phần tử trong chuỗi là: " + count);
</script>
</body>
</html>
