<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    let chars = prompt("Nhập vào một chuỗi ký tự: ");
    let arr = [];

    for (let i = 0; i < chars.length; i++) {
        if (chars[i] === '-') {
            arr[i] = '_';
        } else {
            arr[i] = chars[i];
        }
    }
    let result = "";
    for (let i = 0; i < arr.length; i++) {
        result += arr[i];
    }
    document.write("Chuỗi sau khi thay thế: " + result);
</script>
</body>
</html>
