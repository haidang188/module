<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<!--/* Viết chương trình khởi tạo một mảng số nguyên gồm 10 phần tử.-->
<!--Chương trình thực hiện tính và hiển thị xem có bao nhiêu số nguyên lớn hơn hoặc bằng 10.*/-->

<script>
    let numbers = [1, 2, 5, 8, 10, 12, 15, 16, 18, 19];
    let count = 0;

    document.write("Các số lớn hơn hoặc bằng 10 là: " );
    for (let i = 0; i < numbers.length; i++) {
        if (numbers[i] >= 10) {
            document.write(numbers[i] + " ");
            count++;
        }
    }
    document.write("<br>" + "Có " + count + " số lớn hơn hoặc bằng 10. ");
</script>
</body>
</html>
