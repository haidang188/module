<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
  let numbers = [2,3,5,6,7,1,9,10,12,16];
  let count = 0;

  for (i = 0; i < numbers.length; i++) {
    if (numbers[i] >= 10) {
      document.write(numbers[i] + " " + "<br>");
      count++
    }
  }
  document.write("Các số lớn hơn hoặc bằng 10 là: " + count);
</script>
</body>
</html>
