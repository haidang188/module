<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    function isPrime(n) {
        if (n < 2) return false;
        for (let i = 2; i < Math.sqrt(n); i++) {
            if (n % i === 0) {
                return false;
            }
        }
        return true;
    }

    let num = parseInt(prompt("Nhap vao 1 so nguyen: "));
    let before = num - 1;
    while (!isPrime(before)) {
        before--;
    }
    let after = num + 1;
    while (!isPrime(after)) {
        after++;
    }
    document.write("So nguyen vua nhap la: " + num + "<br>");
    document.write("So nguyen to nho gan " + num + " la: " + before + "<br>");
    document.write("So nguyen to lon gan " + num + " la: " + after);

</script>
</body>
</html>
