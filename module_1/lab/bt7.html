<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quản lý học viên CODEGYM</title>
</head>
<body>
<h2>HỆ THỐNG QUẢN LÝ HỌC VIÊN CODEGYM</h2>
<input type="text" placeholder="Mã học viên (HV-XXXX)" id="id"> <br>
<input type="text" placeholder="Họ tên" id="name"> <br>
<input type="text" placeholder="Lớp" id="classname"> <br>
<input type="text" placeholder="Email" id="email"> <br>
<input type="text" placeholder="Ngày sinh" id="dob"> <br>
<input type="text" placeholder="Module (1-6)" id="module"> <br> <br>



<button id="mainButton" onclick="add()">Thêm học viên</button>
<button onclick="resetForm()">Làm mới</button>
<br>
<h3>Danh sách học viên (<span id="total"></span>)</h3>
<p id="output"></p>

<script>
    class Student {
        constructor(id, name, classname, email, dob, module) {
            this.id = id;
            this.name = name;
            this.classname = classname;
            this.email = email;
            this.dob = dob;
            this.module = module;
        }

        getId() {
            return this.id;
        }

        setId(newId) {
            this.id = newId;
        }

        getName() {
            return this.name;
        }

        setName(newName) {
            this.name = newName;
        }

        getClassname() {
            return this.classname;
        }

        setClassname(newClassname) {
            this.classname = newClassname;
        }

        getEmail() {
            return this.email;
        }

        setEmail(newEmail) {
            this.email = newEmail;
        }

        getDob() {
            return this.dob;
        }

        setDob(newDob) {
            this.dob = newDob;
        }

        getModule() {
            return this.module;
        }

        setModule(newModule) {
            this.module = newModule;
        }
    }
    let s1 = new Student("HV-0001", "Nguyen Van A", "C082025", "nguyenvana@gmail.com", "12/12/2002", "1");
    let s2 = new Student("HV-0002", "Tran Thi B", "C082025", "tranthib@gmail.com", "12/12/2002", "1");
    let s3 = new Student("HV-0003", "Le Van C", "C082025", "levanc@gmail.com", "12/12/2002", "1");
    let s4 = new Student("HV-0004", "Pham Thi D", "C082025", "phamthid@gmail.com", "12/12/2002", "1");
    let s5 = new Student("HV-0005", "Phan Van K", "C082025", "phamvank@gmail.com", "12/12/2002", "1");
    let storage = [s1,s2,s3,s4,s5];

    let editingIndex = -1;

    function display () {
        let sout = `<table border="1px" style="border-collapse: collapse " cellspacing="10" cellpadding="10">
                    <thead>
                         <tr>
                            <th>ID</th>
                             <th>Name</th>
                             <th>Classname</th>
                             <th>Email</th>
                             <th>Date</th>
                             <th>Module</th>
                             <th colspan="2">Action</th>

                         </tr>
                     </thead>
                    <tbody>`

        for (let i = 0; i < storage.length; i++) {
            sout += `<tr>
            <td>${storage[i].getId()}</td>
            <td>${storage[i].getName()}</td>
            <td>${storage[i].getClassname()}</td>
            <td>${storage[i].getEmail()}</td>
            <td>${storage[i].getDob()}</td>
            <td>${storage[i].getModule()}</td>

            <td><button onclick="edit(${i})">Edit</button></td>
            <td><button onclick="del(${i})">Delete</button></td>


</tr>`
        }
        sout += `</tbody></table>`
        document.getElementById('output').innerHTML = sout;
        document.getElementById('total').innerHTML = storage.length;
    }
    display();

    function validate (id, name, dob, module, isEdit = false) {
        const idRegex = /^HV-\d{4}$/;
        const dobRegex = /^(0[1-9]|[12][0-9]|3[01])\/(0[1-9]|1[0-2])\/\d{4}$/;

        if (!idRegex.test(id)) {
            alert("Mã học viên không hợp lệ! Định dạng phải là HV-XXXX");
            return false;
        }
        if (!isEdit && storage.some(s => s.getId() === id)) {
            alert("Mã học viên đã tồn tại!");
            return false;
        }
        if (name.trim() === "" || name.length > 50) {
            alert("Tên không được rỗng và tối đa 50 ký tự");
            return false;
        }
        if (!dobRegex.test(dob)) {
            alert("Ngày sinh không hợp lệ");
            return false;
        }
        if (isNaN(module) || module < 1 || module > 6) {
            alert("Module phải nằm trong 1 - 6");
            return false;
        }
        return true;
    }
    function clearInput() {
        document.getElementById('id').value = '';
        document.getElementById('name').value = '';
        document.getElementById('classname').value = '';
        document.getElementById('email').value = '';
        document.getElementById('dob').value = '';
        document.getElementById('module').value = '';
    }
    function resetForm() {
        clearInput();
        editingIndex = -1;
        document.getElementById('id').disabled = false;
        document.getElementById('mainButton').innerText = "Thêm học viên";
        document.getElementById('mainButton').setAttribute("onclick", "add()");
    }
    function add() {
        let studentId = document.getElementById('id').value;
        let studentName = document.getElementById('name').value;
        let studentClass = document.getElementById('classname').value;
        let studentEmail = document.getElementById('email').value;
        let studentDob = document.getElementById('dob').value;
        let studentModule = document.getElementById('module').value;

        if (!validate(studentId, studentName, studentDob, studentModule)) return;
        let student = new Student(studentId, studentName, studentClass, studentEmail, studentDob, studentModule);
        storage.push(student);
        clearInput();
        display();
        alert("Thêm học viên thành công!");
    }
    function edit(i) {
        let student = storage[i];
        document.getElementById('id').value = student.getId();
        document.getElementById('name').value = student.getName();
        document.getElementById('classname').value = student.getClassname();
        document.getElementById('email').value = student.getEmail();
        document.getElementById('dob').value = student.getDob();
        document.getElementById('module').value = student.getModule();

        document.getElementById('id').disabled = true;
        document.getElementById('mainButton').innerText = "Cập nhật học viên";
        document.getElementById('mainButton').setAttribute("onclick", "update()");
        editingIndex = i;
    }
    function update() {
        let studentName = document.getElementById('name').value;
        let studentClass = document.getElementById('classname').value;
        let studentEmail = document.getElementById('email').value;
        let studentDob = document.getElementById('dob').value;
        let studentModule = document.getElementById('module').value;

        if (!validate(storage[editingIndex].getId(), studentName, studentDob, studentModule, true)) return;

        storage[editingIndex].setName(studentName);
        storage[editingIndex].setClassname(studentClass);
        storage[editingIndex].setEmail(studentEmail);
        storage[editingIndex].setDob(studentDob);
        storage[editingIndex].setModule(studentModule);

        alert("Cập nhật học viên thành công!");
        resetForm();
        display();
    }

    function del(i) {
        let check = confirm(`Bạn có chắc chắn muốn xóa học viên tên ${storage[i].getName()} không?`);
        if (check) {
            storage.splice(i, 1);
            display();
            alert("Xóa thành công!");
        }

    }
</script>
</body>
</html>
