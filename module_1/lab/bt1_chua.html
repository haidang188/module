     * => Viết 1 hàm kiểm tra số có phải là số nguyên không -> return true hoặc false
     * Yêu cầu 1: push sum -> arrSum [] -> findMax
     */
    // 1a
    function findMaxSumOfPairNum(arr) {
        let max = arr[0] + arr[arr.length - 1];
        let first = 1;
        let last = arr.length - 2;
        let num1 = arr[0];
        let num2 = arr[arr.length - 1];
        while (first < last) {
            let temp = arr[first] + arr[last];
            if (max < temp) {
                max = temp;
                num1 = arr[first];
                num2 = arr[last];
            }
            first++;
            last--;
        }
        return [num1, num2];
    }

    let array = [2, 3, 4, 1, 2, 6];
    let result = findMaxSumOfPairNum(array);
    document.write(result);
