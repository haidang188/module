<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    function isPrime(number) {
        if (number < 2) {
            return false;
        }
        if (number === 2) {
            return true;
        }
        if (number % 2 === 0) {
            return false;
        }
        for (let i = 2; i <= Math.sqrt(number); i++) {
            if (number % i === 0) {
                return false;
            }
        }
        return true;
    }

    let num = +prompt("Nhap vao 1 so nguyen: ");
    let arr = [];

    for (let i = num - 1; i >= 2; i--) {
        if (isPrime(i)) {
            arr.push(i);
            break;
        }
    }
    for (let i = num + 1; ; i++) {
        if (isPrime(i)) {
            arr.push(i);
            break;
        }
    }
    document.write(`Cap so nguyen to bao quanh ${num} la: ${arr[0]} va ${arr[1]}`);
</script>
</body>
</html>
