    function reverseString(str) {
        let result = "";

        for (let i = str.length - 1; i >= 0; i--) {
            result += str[i];
        }
        return result;
    }
    let input = prompt("Nhap vao chuoi");
    let output = reverseString(input);
    document.write(output);
