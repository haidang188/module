<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    // Kiểm tra số nguyên tô
    let number = +prompt("Nhap so can kiem tra: ");

    function isPrime(number) {
        let count = 0;
        for (let i = 2; i <= Math.sqrt(number); i++) {
            if (number % i === 0) {
                count++;
            }
        }
        if (count === 0) {
            return true
        } else {
            return false;
        }
    }
    if (isPrime(number)) {
        document.write(`${number} la so nguyen to`);
    } else {
        document.write(`${number} khong phai la so nguyen to`);
    }
</script>
</body>
</html>
