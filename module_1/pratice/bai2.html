    // Cach 2
    let arr = [3, 2, 6, 4, 8, 7, 9];
    let first = 0;
    let last = arr.length - 1;

    while (first < last) {
        let temp = arr[first];
        arr[first] = arr[last];
        arr[last] = temp;
        first++;
        last--;
    }
    for (let i = 0; i< arr.length; i++) {
        for (let j = 0; j < arr.length - 1; j++) {
            if (arr[j] > arr[j + 1]) {
                let temp = arr[j];
                arr[j] = arr[j + 1];
                arr[j + 1] = temp;
            }
        }
    }
    document.write(arr);
