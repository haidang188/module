<!DOCTYPE html>

    <meta charset="UTF-8">

</head>
<body>
<script>
  // Hiển thị 20 số nguyên tố đầu tiên
  let count = 0;
  function isPrime(number) {
    for (let i = 2; i <= Math.sqrt(number); i++) {
      if (number % i === 0) {
        return false;
      }
    }
    return true;
  }
  for (let i = 2; i < 21; i++) {
    let check = isPrime(i);
    if (check) {
      count++;
      document.write(`${i} <br>`);
    }
  }
















</script>
</body>
</html>
